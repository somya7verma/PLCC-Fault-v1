<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>THE SHIELD - Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="styles2.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
<div class="header">
  <div class="logo">THE SHIELD</div>
  <nav class="navigation">
    <a href="fault_details.html">Fault Table</a>
    <a href="power.html">Power Consumption Status</a>
  </nav>
</div>
<div class="main-content">
  <div id="kerala-map" class="map-container" style="height:500px;"></div>
  <div class="alerts-container">
    <div class="alerts-header">ALERTS</div>
    <div class="alert-message" id="fault-status">NO FAULT DETECTED</div>
    <div id="reset-container" style="text-align:center; padding:10px; display:none;">
      <button onclick="resetLine()">Reset (Close Relay)</button>
    </div>
  </div>
</div>

<script>
const map = L.map('kerala-map').setView([10.02, 76.30], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

const nodes = {
  1: L.circleMarker([10.02, 76.30], {radius:8, color:'green', fillColor:'green', fillOpacity:1}).addTo(map).bindPopup("Node 1: OK"),
  2: L.circleMarker([10.021, 76.295], {radius:8, color:'green', fillColor:'green', fillOpacity:1}).addTo(map).bindPopup("Node 2: OK")
};

async function refreshNodes() {
  try {
    const res = await fetch('http://localhost:5000/nodes');
    const data = await res.json();

    const statusRes = await fetch('http://localhost:5000/status');
    const statusJson = await statusRes.json();

    if(!statusJson.backend_online){
      for(let id in nodes){
        nodes[id].setStyle({color:'lightgray', fillColor:'lightgray', fillOpacity:0.6});
        nodes[id].bindPopup("Offline");
      }
      document.getElementById('fault-status').textContent = "OFFLINE - DEVICE NOT CONNECTED";
      document.getElementById('fault-status').style.color = 'gray';
      document.getElementById('reset-container').style.display = 'none';
      return;
    }

    let anyFault = false;
    let faultStart = 3; 

    for(let n of data) {
      let color = 'green';
      if(!n.connected) color = 'red';
      if(n.fault) color = 'orange';
      if(n.id >= faultStart) color = 'red';

      if(n.connected === false || n.fault === true) {
        faultStart = Math.min(faultStart, n.id);
        anyFault = true;
      }

      if(nodes[n.id]){
        nodes[n.id].setStyle({color,color,fillColor:color,fillOpacity:1});
        nodes[n.id].bindPopup(`Node ${n.id}: ${color.toUpperCase()}`);
      }
    }

    document.getElementById('fault-status').textContent = anyFault ? '⚠️ FAULT DETECTED' : 'NO FAULT DETECTED';
    document.getElementById('fault-status').style.color = anyFault ? 'darkred' : '#32CD32';
    document.getElementById('reset-container').style.display = anyFault ? 'block' : 'none';

  } catch (err) {
    for(let id in nodes){
      nodes[id].setStyle({color:'lightgray', fillColor:'lightgray', fillOpacity:0.6});
      nodes[id].bindPopup("Offline");
    }
    document.getElementById('fault-status').textContent = "OFFLINE - DEVICE NOT CONNECTED";
    document.getElementById('fault-status').style.color = 'gray';
    document.getElementById('reset-container').style.display = 'none';
  }
}

async function resetLine() {
  try {
    let res = await fetch('http://localhost:5000/reset', {method:'POST'});
    let json = await res.json();
    alert(json.msg || "Reset command sent");
  } catch (e) {
    alert("Reset failed: "+e);
  }
}

setInterval(refreshNodes, 2000);
refreshNodes();
</script>
</body>
</html>
