<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THE SHIELD - Fault Details</title>
  <link rel="stylesheet" href="styles2.css"/>
</head>
<body>
<div class="header">
  <div class="logo">THE SHIELD</div>
  <nav class="navigation">
    <a href="index.html">Dashboard View</a>
    <a href="power.html">Power Consumption Status</a>
  </nav>
</div>
<div class="details-content">
  <h2>Power Line Faults and Node Status</h2>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Node ID</th>
          <th>Status</th>
          <th>Fault Present</th>
          <th>Location (Lat, Lng)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="fault-table-body">
        <tr><td colspan="5" style="text-align:center;color:green;">Loading status...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
async function loadFaultsAndStatus() {
  const tbody = document.getElementById('fault-table-body');
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:green;">Loading status...</td></tr>';

  try {
    const nodesRes = await fetch('http://localhost:5000/nodes');
    const nodes = await nodesRes.json();

    const faultsRes = await fetch('http://localhost:5000/faults');
    const faults = await faultsRes.json();

    tbody.innerHTML = ''; 

    nodes.forEach(node => {
      const fault = faults.find(f => f.poleId === `PN-${node.id}`);

      const statusText = node.connected ? "ONLINE" : "OFFLINE";
      const faultText = fault ? fault.type : "No Fault";
      const rowClass = fault ? "fault-critical" : (node.connected ? "" : "fault-warning");

      tbody.innerHTML += `
        <tr class="${rowClass}">
          <td>${node.id}</td>
          <td>${statusText}</td>
          <td>${fault ? "YES" : "NO"}</td>
          <td>${node.lat.toFixed(4)}, ${node.lng.toFixed(4)}</td>
          <td><button class="btn-view" onclick="navigateToNode(${node.lat}, ${node.lng}, ${node.id})">Navigate</button></td>
        </tr>`;
    });

    if (nodes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No nodes found</td></tr>';
    }
  } catch (error) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;">Error loading data: ${error}</td></tr>`;
  }
}

function navigateToNode(lat, lng, nodeId) {
  window.location.href = `index.html?fault=true&lat=${lat}&lng=${lng}&nodeId=${nodeId}`;
}

loadFaultsAndStatus();
setInterval(loadFaultsAndStatus, 3000);
</script>
</body>
</html>
